name: obdms-blood-bank
type: web
runtime: python

root_directory = "."
requirements = "requirements.txt"
start_command = "gunicorn obdms.wsgi:application --bind 0.0.0.0:8000"

[[env]]
name = "DJANGO_SETTINGS_MODULE"
value = "obdms.settings"

[[env]]
name = "PYTHONUNBUFFERED"
value = "1"

[build]
builder = "heroku.buildpacks"
buildpacks = [
  "heroku/python",
]
